<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const btnLaunch = document.getElementById('btnLaunch');
    const feedback = document.getElementById('feedback');

    // --- CONFIGURATION ---
    const normalGravity = 0.6;
    const groundY = 400;
    const startX = 100;
    const startY = 320;

    let score = 0;
    let level = 1;
    let launchParams = { angle: 45, force: 70 };
    let ball = { x: startX, y: startY, vx: 0, vy: 0, active: false };
    let basket = { x: 500, y: groundY - 5, w: 70, h: 40 };
    let trajectory = [];
    let mouseX = 0;
    let timeScale = 1; // 1 = normal, 0.2 = ralenti

    function draw() {
        ctx.save(); // Sauvegarder l'état pour le zoom

        // --- EFFET DE ZOOM DRAMATIQUE ---
        // Si le ballon est bas et actif, on zoome un peu vers le bas
        if (ball.active && ball.y > 250 && ball.vy > 0) {
            timeScale = 0.15; // Ralentissement extrême (Slow-mo)
            const zoomFactor = 1.1;
            ctx.translate(canvas.width / 2, canvas.height);
            ctx.scale(zoomFactor, zoomFactor);
            ctx.translate(-canvas.width / 2, -canvas.height);
        } else {
            timeScale = 1;
        }

        ctx.clearRect(-100, -100, canvas.width + 200, canvas.height + 200);

        // 1. Sol
        ctx.strokeStyle = "#58a6ff";
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(canvas.width, groundY); ctx.stroke();

        // 2. Stickman
        drawStickman(startX - 20, groundY);

        // 3. Trajectoire
        ctx.strokeStyle = "rgba(88, 166, 255, 0.3)";
        ctx.beginPath();
        trajectory.forEach((p, i) => { if(i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
        ctx.stroke();

        // 4. Panier
        drawBasket();

        // 5. Ballon
        ctx.fillStyle = "#f85149";
        ctx.shadowColor = "#f85149";
        ctx.shadowBlur = ball.active ? 20 : 0;
        ctx.beginPath(); ctx.arc(ball.x, ball.y, 10, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;

        if (ball.active) updatePhysics();
        
        ctx.restore(); // Annuler le zoom pour le prochain cycle
        requestAnimationFrame(draw);
    }

    function updatePhysics() {
        // On multiplie tout par timeScale pour l'effet ralenti
        ball.x += ball.vx * timeScale;
        ball.y += ball.vy * timeScale;
        ball.vy += normalGravity * timeScale;
        
        trajectory.push({x: ball.x, y: ball.y});

        if (ball.y >= groundY - 10) {
            ball.y = groundY - 10;
            ball.active = false;
            checkWin();
        }
    }

    function drawBasket() {
        if (!ball.active) basket.x = mouseX;
        
        // Limites
        if (basket.x < 200) basket.x = 200;
        if (basket.x > canvas.width - 50) basket.x = canvas.width - 50;

        const bx = basket.x - (basket.w / 2);
        const by = basket.y - basket.h;

        // Couleur change si ralenti (effet "focus")
        ctx.strokeStyle = (timeScale < 1) ? "#ffea00" : "#2ea043";
        ctx.lineWidth = (timeScale < 1) ? 6 : 4;
        ctx.strokeRect(bx, by, basket.w, 10);
        
        // Filet
        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        ctx.lineWidth = 1;
        ctx.strokeRect(bx, by + 10, basket.w, 30);
    }

    function checkWin() {
        const win = ball.x >= basket.x - basket.w/2 && ball.x <= basket.x + basket.w/2;
        if (win) {
            score += 100;
            document.getElementById('scoreVal').innerText = score;
            showFeedback("OMG C'EST DEDANS ! 🔥", "#2ea043");
            level++;
            document.getElementById('levelVal').innerText = level;
        } else {
            showFeedback("NOOOON ! Trop loin...", "#f85149");
        }

        setTimeout(() => {
            resetBall();
            setRandomLaunchParams();
            btnLaunch.disabled = false;
        }, 2000);
    }

    // --- RESTE DES FONCTIONS (IDENTIQUES) ---
    function drawStickman(x, y) {
        ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.beginPath();
        ctx.moveTo(x, y - 10); ctx.lineTo(x, y - 50); // Corps
        ctx.arc(x, y - 60, 10, 0, Math.PI*2); // Tête
        ctx.moveTo(x, y - 45); ctx.lineTo(x - 15, y - 60); // Bras
        ctx.moveTo(x, y - 10); ctx.lineTo(x - 10, y); ctx.lineTo(x + 10, y); // Jambes
        ctx.stroke();
    }

    function showFeedback(text, color) {
        feedback.innerText = text;
        feedback.style.color = color;
        feedback.style.display = "block";
        feedback.style.fontSize = "4rem";
        setTimeout(() => feedback.style.display = "none", 1500);
    }

    function setRandomLaunchParams() {
        launchParams.angle = 35 + (Math.random() * 35);
        launchParams.force = 60 + (Math.random() * 40);
    }

    btnLaunch.onclick = () => {
        if (ball.active) return;
        btnLaunch.disabled = true;
        const rad = launchParams.angle * Math.PI / 180;
        const v0 = launchParams.force * 0.25;
        ball.vx = Math.cos(rad) * v0;
        ball.vy = -Math.sin(rad) * v0;
        ball.active = true;
    };

    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
    });

    function resetBall() { ball = { x: startX, y: startY, vx: 0, vy: 0, active: false }; trajectory = []; }
    
    setRandomLaunchParams();
    draw();
</script>
